<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>タスク管理</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app-layout">
      <main>
        <header class="app-header">
          <h1>タスク管理</h1>
          <nav class="page-tabs">
            <button class="tab-button active" type="button" data-page="mainPage">
              メイン
            </button>
            <button class="tab-button" type="button" data-page="reportPage">
              振り返り
            </button>
            <button class="tab-button" type="button" data-page="calendarPage">
              カレンダー
            </button>
            <button class="tab-button" type="button" data-page="settingsPage">
              設定
            </button>
          </nav>
        </header>

        <section class="page active" id="mainPage">
          <div class="view-mode-buttons">
            <button class="view-mode-button active" id="folderViewButton" type="button">
              フォルダごとに表示
            </button>
            <button class="view-mode-button" id="tagViewButton" type="button">
              タグごとに表示
            </button>
            <div class="sort-menu">
              <button class="view-mode-button" id="taskSortButton" type="button">
                並び替え
              </button>
              <div class="sort-options hidden" id="taskSortOptions">
                <button type="button" data-sort="due-asc">締切日が早い順</button>
                <button type="button" data-sort="due-desc">締切日が遅い順</button>
                <button type="button" data-sort="title-asc">50音順</button>
                <button type="button" data-sort="custom">カスタム</button>
              </div>
            </div>
          </div>
          <div class="folder-toolbar" id="folderControls">
            <div class="folder-list" id="folderList"></div>
            <button id="addFolderButton" type="button">フォルダ追加</button>
          </div>
          <div class="tag-list hidden" id="tagList"></div>

          <form id="taskForm">
            <input id="taskInput" type="text" placeholder="タスクを入力" />
            <input id="dueDateInput" type="date" />
            <input
              id="estimatedMinutesInput"
              type="number"
              placeholder="予想時間（分）"
            />
            <input id="tagNameInput" type="text" placeholder="タグ（教科・プロジェクト）" />
            <input id="tagColorInput" type="color" value="#38bdf8" title="タグの色" />
            <select id="taskFolderInput"></select>
            <button id="addButton" type="submit">追加</button>
          </form>

          <section class="task-section">
            <h2>タスクリスト</h2>
            <div class="task-list" id="taskList"></div>
          </section>

          <section class="task-section">
            <h2>完了タスク</h2>
            <div class="task-list completed-list" id="completedTaskList"></div>
          </section>
        </section>

        <section class="page" id="reportPage">
          <div class="report-header">
            <h2>振り返り</h2>
            <button class="arrow-button" id="previousRangeButton" type="button">←</button>
            <strong id="reportRangeLabel"></strong>
            <button class="arrow-button" id="nextRangeButton" type="button">→</button>
            <div class="range-buttons">
              <button class="range-button active" type="button" data-range="day">
                day
              </button>
              <button class="range-button" type="button" data-range="week">
                week
              </button>
              <button class="range-button" type="button" data-range="month">
                month
              </button>
            </div>
          </div>
          <canvas id="workTimeChart"></canvas>
        </section>

        <section class="page" id="calendarPage">
          <h2>カレンダー</h2>
          <div class="calendar-header">
            <button class="arrow-button" id="previousCalendarMonthButton" type="button">←</button>
            <strong id="calendarMonthLabel"></strong>
            <button class="arrow-button" id="nextCalendarMonthButton" type="button">→</button>
          </div>
          <div class="due-date-calendar" id="dueDateCalendar"></div>
          <h3 class="calendar-subheading">Googleカレンダーに追加</h3>
          <button id="openGoogleCalendarModalButton" type="button">
            Googleカレンダー連携
          </button>
        </section>

        <section class="page" id="settingsPage">
          <h2>設定</h2>
          <section class="settings-section">
            <h3>テーマカラー</h3>
            <div class="theme-options" id="themeOptions"></div>
          </section>
          <section class="settings-section">
            <h3>タイマー表示</h3>
            <div class="timer-mode-buttons">
              <button class="timer-mode-button active" type="button" data-mode="digital">
                デジタル
              </button>
              <button class="timer-mode-button" type="button" data-mode="analog">
                アナログ
              </button>
            </div>
          </section>
          <section class="settings-section danger-section">
            <h3>データリセット</h3>
            <button class="danger-button" id="openResetModalButton" type="button">
              データリセット
            </button>
          </section>
        </section>
      </main>

      <aside class="stopwatch-panel" id="stopwatchPanel">
        <p class="stopwatch-label">作業タイマー</p>
        <h2 id="stopwatchTaskName">停止中</h2>
        <div class="stopwatch-metric">
          <span>今回</span>
          <p class="stopwatch-time" id="stopwatchTime">00:00:00</p>
        </div>
        <div class="analog-clock hidden" id="analogClock">
          <div class="analog-hand hour-hand" id="hourHand"></div>
          <div class="analog-hand minute-hand" id="minuteHand"></div>
          <div class="analog-hand second-hand" id="secondHand"></div>
        </div>
        <div class="stopwatch-metric">
          <span>累計</span>
          <p class="stopwatch-total-time" id="stopwatchTotalTime">00:00:00</p>
        </div>
        <p class="stopwatch-hint" id="stopwatchHint">
          タスクの開始ボタンで計測します。
        </p>
      </aside>
    </div>
    <div class="operation-toast" id="operationToast">準備できました。</div>
    <div class="modal-backdrop hidden" id="folderModal">
      <section class="folder-modal" aria-labelledby="folderModalTitle">
        <button
          class="modal-close-button"
          id="closeFolderModalButton"
          type="button"
          aria-label="閉じる"
        >
          ×
        </button>
        <h2 id="folderModalTitle">フォルダ追加</h2>
        <form class="folder-modal-form" id="folderForm">
          <input id="newFolderInput" type="text" placeholder="新しいフォルダ名" />
          <button id="saveFolderButton" type="submit">追加</button>
        </form>
      </section>
    </div>
    <div class="modal-backdrop hidden" id="resetModal">
      <section class="folder-modal reset-modal" aria-labelledby="resetModalTitle">
        <h2 id="resetModalTitle">データリセット</h2>
        <p>全てのデータが無くなってしまいますが、リセットしますか？</p>
        <div class="reset-modal-actions">
          <button class="danger-button" id="confirmResetButton" type="button">
            リセットする
          </button>
          <button class="secondary-button" id="cancelResetButton" type="button">
            戻る
          </button>
        </div>
      </section>
    </div>
    <div class="modal-backdrop hidden" id="googleCalendarModal">
      <section class="folder-modal google-calendar-modal" aria-labelledby="googleCalendarModalTitle">
        <button
          class="modal-close-button"
          id="closeGoogleCalendarModalButton"
          type="button"
          aria-label="閉じる"
        >
          ×
        </button>
        <h2 id="googleCalendarModalTitle">登録するタスクを選択</h2>
        <div class="calendar-task-list" id="googleCalendarTaskList"></div>
      </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="script.js?v=20260712-8"></script>
  </body>
</html>
